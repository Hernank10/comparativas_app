{% extends "base.html" %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-primary text-white"><h4 class="mb-0"><i class="bi bi-box-arrow-in-right"></i> Iniciar Sesión</h4></div>
                <div class="card-body">
                    <form method="POST" action="/login">
                        <div class="mb-3"><label class="form-label">Usuario</label><input type="text" class="form-control" name="username" required></div>
                        <div class="mb-3"><label class="form-label">Contraseña</label><input type="password" class="form-control" name="password" required></div>
                        <button type="submit" class="btn btn-primary"><i class="bi bi-box-arrow-in-right"></i> Entrar</button>
                        <a href="{{ url_for('register') }}" class="btn btn-link">¿No tienes cuenta? Regístrate</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
