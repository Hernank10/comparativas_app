{% extends "base.html" %}
{% block content %}
<div class="container py-4">
    <h1 class="mb-4">Mis Logros</h1>
    <div class="row" id="achievements-container"></div>
</div>
<script>
fetch('/api/logros').then(r=>r.json()).then(data=>{
    let container=document.getElementById('achievements-container');
    data.forEach(a=>{container.innerHTML+='<div class="col-md-3 mb-4"><div class="card text-center"><div class="card-body"><div class="achievement-badge '+(a.unlocked?'':'locked')+' mx-auto mb-3"><i class="bi '+a.icon+'"></i></div><h5>'+a.name+'</h5><p class="text-muted">'+a.description+'</p>'+(a.unlocked?'<span class="badge bg-success">Desbloqueado</span>':'<span class="badge bg-secondary">Bloqueado</span>')+'</div></div></div>';});
});
</script>
{% endblock %}
