{% extends "base.html" %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-success text-white"><h4 class="mb-0"><i class="bi bi-person-plus"></i> Registro</h4></div>
                <div class="card-body">
                    <form method="POST" action="/register">
                        <div class="mb-3"><label class="form-label">Usuario</label><input type="text" class="form-control" name="username" required></div>
                        <div class="mb-3"><label class="form-label">Email</label><input type="email" class="form-control" name="email" required></div>
                        <div class="mb-3"><label class="form-label">Contraseña</label><input type="password" class="form-control" name="password" required></div>
                        <button type="submit" class="btn btn-success"><i class="bi bi-person-plus"></i> Registrarse</button>
                        <a href="{{ url_for('login') }}" class="btn btn-link">¿Ya tienes cuenta? Inicia sesión</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
